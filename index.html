<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizonic Clothes | Minimalist & Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2300cb; --white: #ffffff; --bg: #f8f9fc; --text: #1a1a1a; --light-text: #666; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Header */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }
        .cart-btn { background: none; border: none; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text); transition: 0.3s; }
        .cart-btn:hover { color: var(--primary); }
        .cart-count { background: var(--primary); color: var(--white); border-radius: 20px; padding: 2px 10px; font-size: 13px; font-weight: bold; }

        /* Hero Banner */
        .hero { padding: 100px 20px; text-align: center; background: var(--white); margin-bottom: 50px; border-bottom: 1px solid #eee; }
        .hero h1 { font-size: 42px; margin-bottom: 20px; font-weight: 800; color: var(--primary); line-height: 1.2; }
        .hero p { color: var(--light-text); font-size: 18px; max-width: 600px; margin: 0 auto; line-height: 1.6; }

        /* Product Grid */
        .container { max-width: 1300px; margin: 0 auto; padding: 0 5%; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 100px; }
        
        /* Product Card with Modern Hover Effects */
        .product-card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: transform 0.4s ease, box-shadow 0.4s ease; text-align: left; position: relative; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(35,0,203,0.1); }
        .img-wrapper { position: relative; width: 100%; padding-top: 125%; /* Aspect Ratio 4:5 */ overflow: hidden; background: #f0f0f0; }
        .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .product-card:hover .product-img { transform: scale(1.05); }
        
        .product-info { padding: 20px; }
        .product-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .product-price { font-size: 18px; color: var(--primary); font-weight: 800; margin-bottom: 20px; }
        
        .add-to-cart { width: 100%; padding: 16px; background-color: var(--primary); color: var(--white); border: none; font-size: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: 0.3s; letter-spacing: 0.5px; }
        .add-to-cart:hover { background-color: #1a0099; box-shadow: 0 8px 20px rgba(35,0,203,0.2); }

        /* Toast Notification */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; color: white; padding: 15px 30px; border-radius: 50px; font-weight: 600; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Cart Drawer (Modern Slide-in) */
        .cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 999; justify-content: flex-end; opacity: 0; transition: opacity 0.3s; }
        .cart-modal.show { opacity: 1; }
        .cart-content { width: 100%; max-width: 450px; background: var(--white); height: 100%; padding: 30px; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); overflow-y: auto; }
        .cart-modal.show .cart-content { transform: translateX(0); }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg); padding-bottom: 20px; margin-bottom: 20px; }
        .cart-header h2 { font-weight: 800; color: var(--primary); }
        .close-cart { background: #f0f0f0; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-cart:hover { background: #e0e0e0; color: red; }
        
        .empty-state { text-align: center; margin: auto 0; }
        .empty-state h3 { font-size: 22px; margin-bottom: 10px; color: var(--text); }
        .empty-state p { color: var(--light-text); font-size: 15px; line-height: 1.5; }

        .checkout-form { margin-top: auto; border-top: 2px solid var(--bg); padding-top: 20px; display: none; }
        .checkout-form input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: var(--bg); outline: none; transition: 0.3s; }
        .checkout-form input:focus { border-color: var(--primary); background: var(--white); }
        .checkout-btn { width: 100%; padding: 20px; background-color: var(--primary); color: var(--white); border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; box-shadow: 0 10px 20px rgba(35,0,203,0.15); transition: 0.3s; }
        .checkout-btn:hover { background-color: #1a0099; transform: translateY(-2px); }
        
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px; font-weight: 600; padding: 15px; background: var(--bg); border-radius: 8px; }
        .total-price { font-weight: 800; font-size: 22px; text-align: right; margin-top: 20px; color: var(--primary); }
        
        .loading { text-align: center; padding: 80px 20px; color: var(--light-text); grid-column: 1 / -1; font-size: 18px; font-weight: 600; }
        
        /* Skeleton Loading Effect */
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        .skeleton { background: #f6f7f8; background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%); background-repeat: no-repeat; background-size: 800px 100%; animation-duration: 1.5s; animation-fill-mode: forwards; animation-iteration-count: infinite; animation-name: shimmer; border-radius: 16px; height: 400px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Sizonic Clothes</div>
        <button class="cart-btn" onclick="openCart()">
            Giỏ hàng <span class="cart-count" id="cartCount">0</span>
        </button>
    </header>

    <section class="hero">
        <h1>Phong Cách Tối Giản. <br>Trải Nghiệm Tối Đa.</h1>
        <p>Khám phá bộ sưu tập mới nhất với thiết kế tinh chỉnh, chất liệu cao cấp và sự tỉ mỉ trong từng đường kim mũi chỉ.</p>
    </section>

    <div class="container">
        <div class="product-grid" id="productGrid">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
    </div>

    <div class="toast" id="toastMsg">Đã thêm vào giỏ hàng!</div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>GIỎ HÀNG CỦA BẠN</h2>
                <button class="close-cart" onclick="closeCart()">&times;</button>
            </div>

            <div class="empty-state" id="emptyState">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="margin-bottom:20px;">
                    <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                <h3>Giỏ hàng trống</h3>
                <p>Tủ đồ của bạn đang chờ những siêu phẩm mới từ Sizonic.</p>
            </div>

            <div style="flex-grow: 1; overflow-y: auto;">
                <div id="cartItemsList"></div>
                <div class="total-price" id="totalPriceDisplay" style="display: none;"></div>
            </div>

            <div class="checkout-form" id="checkoutForm">
                <input type="text" id="cName" placeholder="Họ và tên người nhận">
                <input type="text" id="cPhone" placeholder="Số điện thoại liên hệ">
                <input type="text" id="cAddress" placeholder="Địa chỉ giao hàng chi tiết">
                <button class="checkout-btn" onclick="submitOrder()">HOÀN TẤT ĐẶT HÀNG</button>
            </div>
        </div>
    </div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzEO5f7aPUAqcMzHLgtrBh9ILNYsDDbBIcQytwjkxf3bDHegUdvunlGae9XU8EBw3V/exec";
        let cart = [];

        async function loadProducts() {
            try {
                const response = await fetch(APP_SCRIPT_URL + "?action=get");
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                document.getElementById('productGrid').innerHTML = '<div class="loading">Hệ thống đang bảo trì. Vui lòng quay lại sau ít phút.</div>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            if(!products || products.length === 0) {
                grid.innerHTML = '<div class="loading">Bộ sưu tập mới đang được cập nhật.</div>';
                return;
            }

            products.forEach(p => {
                const priceFormatted = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(p.price);
                const html = `
                    <div class="product-card">
                        <div class="img-wrapper">
                            <img src="${p.image}" class="product-img" loading="lazy" alt="${p.name}">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div class="product-price">${priceFormatted}</div>
                            <button class="add-to-cart" onclick="addToCart('${p.name}', ${p.price})">Thêm vào giỏ</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cartCount').innerText = cart.length;
            renderCart();
            
            // Hiện thông báo Toast
            const toast = document.getElementById('toastMsg');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function renderCart() {
            const emptyState = document.getElementById('emptyState');
            const itemsList = document.getElementById('cartItemsList');
            const checkoutForm = document.getElementById('checkoutForm');
            const totalDisplay = document.getElementById('totalPriceDisplay');

            if(cart.length === 0) {
                emptyState.style.display = 'block';
                itemsList.innerHTML = '';
                checkoutForm.style.display = 'none';
                totalDisplay.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                checkoutForm.style.display = 'block';
                totalDisplay.style.display = 'block';
                
                let html = '';
                let total = 0;
                cart.forEach((item) => {
                    total += Number(item.price);
                    html += `
                        <div class="cart-item">
                            <span>${item.name}</span>
                            <span style="color: var(--primary);">${new Intl.NumberFormat('vi-VN').format(item.price)} đ</span>
                        </div>
                    `;
                });
                itemsList.innerHTML = html;
                totalDisplay.innerText = `Tổng cộng: ${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(total)}`;
            }
        }

        function submitOrder() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const address = document.getElementById('cAddress').value;

            if(!name || !phone || !address) {
                alert("Vui lòng nhập đầy đủ thông tin giao hàng để Sizonic phục vụ bạn tốt nhất!");
                return;
            }

            alert(`Cảm ơn ${name}! Đơn hàng của bạn đã được Sizonic tiếp nhận. Chúng tôi sẽ gọi lại số ${phone} trong thời gian sớm nhất.`);
            cart = [];
            document.getElementById('cartCount').innerText = 0;
            renderCart();
            closeCart();
            // Code bắn đơn hàng về Email/Google Sheets sẽ thêm vào bước tiếp theo
        }

        function openCart() { 
            const modal = document.getElementById('cartModal');
            modal.style.display = 'flex'; 
            setTimeout(() => { modal.classList.add('show'); }, 10);
            renderCart(); 
        }
        function closeCart() { 
            const modal = document.getElementById('cartModal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
        
        loadProducts();
    </script>
</body>
</html>
