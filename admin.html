<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizonic Workspace</title>
    <style>
        :root { --primary: #2300cb; --bg: #f4f7f6; --text: #333; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; }
        
        .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: 0.3s; }
        input[type="text"]:focus, input[type="number"]:focus { border-color: var(--primary); }
        input[type="file"] { padding: 10px 0; }
        
        .btn { padding: 12px 20px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { background-color: #1a0099; transform: translateY(-2px); }
        .btn-danger { background-color: #e74c3c; width: auto; padding: 8px 12px; font-size: 12px; }
        .btn-edit { background-color: #f39c12; width: auto; padding: 8px 12px; font-size: 12px; margin-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; font-weight: 600; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        
        #adminWorkspace { display: none; }
        .status { text-align: center; font-size: 14px; color: #27ae60; font-weight: bold; margin-top: 10px; }
        .loading-text { color: #888; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>SIZONIC WORKSPACE</h1>
    <p>Hệ thống quản trị nội dung</p>
</div>

<div class="container" id="loginPanel" style="max-width: 400px;">
    <div class="panel">
        <h2>Đăng Nhập Quản Trị</h2>
        <div class="form-group">
            <input type="password" id="adminPass" placeholder="Nhập mật khẩu (sizonic123)...">
        </div>
        <button class="btn" onclick="checkLogin()">Xác Nhận</button>
    </div>
</div>

<div class="container" id="adminWorkspace">
    <div class="panel" style="flex: 1;">
        <h2 id="formTitle">Thêm Sản Phẩm Mới</h2>
        <input type="hidden" id="editId" value="">
        <div class="form-group">
            <label>Tên sản phẩm</label>
            <input type="text" id="pName" placeholder="VD: Sơ mi nam trắng">
        </div>
        <div class="form-group">
            <label>Giá (VNĐ)</label>
            <input type="number" id="pPrice" placeholder="VD: 350000">
        </div>
        <div class="form-group">
            <label>Hình ảnh (Hệ thống tự động nén & tối ưu)</label>
            <input type="file" id="pFile" accept="image/*">
            <small style="color:#666; display:block; margin-top:5px;" id="fileHint">Bỏ trống nếu giữ ảnh cũ (khi sửa)</small>
        </div>
        <button class="btn" id="submitBtn" onclick="saveProduct()">LƯU SẢN PHẨM</button>
        <button class="btn" id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#888; margin-top:10px;">HỦY CHỈNH SỬA</button>
        <div class="status" id="statusText"></div>
    </div>

    <div class="panel" style="flex: 2;">
        <h2>Kho Hàng Hiện Tại</h2>
        <button class="btn" style="width: auto; margin-bottom:10px; font-size:12px; background:#27ae60;" onclick="loadProductsList()">Làm mới danh sách</button>
        <div style="overflow-x: auto;">
            <table id="productsTable">
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên SP</th>
                        <th>Giá</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <tr><td colspan="4" class="loading-text">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzEO5f7aPUAqcMzHLgtrBh9ILNYsDDbBIcQytwjkxf3bDHegUdvunlGae9XU8EBw3V/exec";
    const IMGBB_API_KEY = "9b520a8bbdf8d98be5177338f8040c6d"; 

    function checkLogin() {
        if(document.getElementById('adminPass').value === "sizonic123") {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminWorkspace').style.display = 'flex';
            loadProductsList();
        } else { alert("Sai mật khẩu!"); }
    }

    // THUẬT TOÁN NÉN ẢNH (Ép về 800px, giảm chất lượng JPEG để web load siêu tốc)
    function compressImage(file, maxWidth = 800, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', quality);
                };
            };
            reader.onerror = error => reject(error);
        });
    }

    async function saveProduct() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const fileInput = document.getElementById('pFile');
        const btn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');

        if(!name || !price) return alert("Vui lòng nhập Tên và Giá!");
        if(!id && fileInput.files.length === 0) return alert("Sản phẩm mới cần phải có ảnh!");

        btn.innerText = "ĐANG XỬ LÝ...";
        btn.disabled = true;

        try {
            let imageUrl = "";
            // Nếu có ảnh, tiến hành NÉN và UPLOAD
            if(fileInput.files.length > 0) {
                btn.innerText = "ĐANG NÉN & TẢI ẢNH...";
                const compressedFile = await compressImage(fileInput.files[0]);
                const formData = new FormData();
                formData.append("image", compressedFile);
                
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const imgData = await imgRes.json();
                imageUrl = imgData.data.url;
            }

            btn.innerText = "ĐANG LƯU DỮ LIỆU...";
            let url = `${APP_SCRIPT_URL}?action=${id ? 'edit' : 'add'}&name=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}`;
            if(id) url += `&id=${id}`;
            if(imageUrl) url += `&image=${encodeURIComponent(imageUrl)}`;

            await fetch(url);
            
            statusText.innerText = id ? "Cập nhật thành công!" : "Thêm mới thành công!";
            cancelEdit(); // Xóa form
            loadProductsList(); // Tải lại bảng

            setTimeout(() => { statusText.innerText = ""; }, 3000);
        } catch (error) {
            alert("Lỗi mạng, vui lòng thử lại!");
        } finally {
            btn.innerText = "LƯU SẢN PHẨM";
            btn.disabled = false;
        }
    }

    async function loadProductsList() {
        const tbody = document.getElementById('productsBody');
        tbody.innerHTML = '<tr><td colspan="4" class="loading-text">Đang tải dữ liệu...</td></tr>';
        try {
            const res = await fetch(APP_SCRIPT_URL + "?action=get");
            const products = await res.json();
            tbody.innerHTML = '';
            if(products.length === 0) return tbody.innerHTML = '<tr><td colspan="4" class="loading-text">Kho trống</td></tr>';
            
            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${p.image}" class="thumb"></td>
                    <td style="font-weight:600;">${p.name}</td>
                    <td style="color:#e74c3c; font-weight:bold;">${Number(p.price).toLocaleString('vi-VN')} đ</td>
                    <td>
                        <button class="btn btn-edit" onclick="editProduct('${p.id}', '${p.name}', '${p.price}')">Sửa</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4" class="loading-text" style="color:red;">Lỗi tải dữ liệu</td></tr>';
        }
    }

    function editProduct(id, name, price) {
        document.getElementById('formTitle').innerText = "Chỉnh Sửa Sản Phẩm";
        document.getElementById('editId').value = id;
        document.getElementById('pName').value = name;
        document.getElementById('pPrice').value = price;
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0, 0);
    }

    function cancelEdit() {
        document.getElementById('formTitle').innerText = "Thêm Sản Phẩm Mới";
        document.getElementById('editId').value = "";
        document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = "";
        document.getElementById('pFile').value = "";
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function deleteProduct(id) {
        if(!confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) return;
        try {
            await fetch(`${APP_SCRIPT_URL}?action=delete&id=${id}`);
            loadProductsList();
        } catch (e) { alert("Lỗi khi xóa!"); }
    }
</script>
</body>
</html>
