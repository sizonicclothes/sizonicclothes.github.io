<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Sizonic Clothes</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { width: 100%; padding: 12px; background-color: #111; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background-color: #333; }
        #adminPanel { display: none; }
        .status { margin-top: 15px; text-align: center; font-size: 14px; color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="loginPanel">
    <h2>Sizonic Admin</h2>
    <div class="form-group">
        <label>Mật khẩu quản trị</label>
        <input type="password" id="adminPass" placeholder="Nhập mật khẩu...">
    </div>
    <button class="btn" onclick="checkLogin()">Đăng Nhập</button>
</div>

<div class="container" id="adminPanel">
    <h2>Thêm Sản Phẩm Mới</h2>
    <div class="form-group">
        <label>Tên sản phẩm</label>
        <input type="text" id="pName" placeholder="VD: Áo Thun Basic Trắng">
    </div>
    <div class="form-group">
        <label>Giá (VNĐ)</label>
        <input type="number" id="pPrice" placeholder="VD: 250000">
    </div>
    <div class="form-group">
        <label>Hình ảnh (Chụp hoặc chọn từ máy)</label>
        <input type="file" id="pFile" accept="image/*">
    </div>
    <button class="btn" id="submitBtn" onclick="uploadAndSave()">Lưu Sản Phẩm</button>
    <div class="status" id="statusText"></div>
</div>

<script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzEO5f7aPUAqcMzHLgtrBh9ILNYsDDbBIcQytwjkxf3bDHegUdvunlGae9XU8EBw3V/exec";
    const IMGBB_API_KEY = "9b520a8bbdf8d98be5177338f8040c6d"; 

    function checkLogin() {
        if(document.getElementById('adminPass').value === "sizonic123") {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("Sai mật khẩu!");
        }
    }

    async function uploadAndSave() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const fileInput = document.getElementById('pFile');
        const statusText = document.getElementById('statusText');
        const btn = document.getElementById('submitBtn');

        if(!name || !price || fileInput.files.length === 0) {
            alert("Vui lòng điền đủ thông tin và chọn ảnh!");
            return;
        }

        btn.innerText = "Đang tải ảnh lên kho...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const imgData = await imgRes.json();
            const imageUrl = imgData.data.url;

            btn.innerText = "Đang đồng bộ Google Sheets...";
            
            const url = `${APP_SCRIPT_URL}?action=add&name=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}&image=${encodeURIComponent(imageUrl)}`;
            await fetch(url);
            
            statusText.innerText = "Đã thêm lên web thành công!";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            fileInput.value = "";
            
            setTimeout(() => { statusText.innerText = ""; btn.innerText = "LƯU SẢN PHẨM"; btn.disabled = false; }, 3000);

        } catch (error) {
            alert("Lỗi tải ảnh hoặc lưu kho. Kiểm tra lại kết nối!");
            btn.innerText = "LƯU SẢN PHẨM";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
